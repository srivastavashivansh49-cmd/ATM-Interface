<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATM Interface</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="atm-card">
      <div class="top-row">
        <div>
          <p class="mini-title">Java Project UI</p>
          <h1>ATM Interface</h1>
        </div>
        <div class="chip"></div>
      </div>

      <div class="screen">
        <p class="screen-label">Current Balance</p>
        <h2 id="balance">$1000.00</h2>
        <p id="message">Choose an option below</p>
      </div>

      <div class="input-area">
        <label for="amount">Enter Amount</label>
        <input type="number" id="amount" placeholder="Example: 500" />
      </div>

      <div class="buttons">
        <button onclick="checkBalance()">Check Balance</button>
        <button onclick="depositMoney()">Deposit</button>
        <button onclick="withdrawMoney()">Withdraw</button>
        <button class="exit" onclick="exitATM()">Exit</button>
      </div>

      <div class="note">
        <strong>Menu:</strong> 1. Check Balance &nbsp; 2. Deposit &nbsp; 3. Withdraw &nbsp; 4. Exit
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
